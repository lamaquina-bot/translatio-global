<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 50" width="280" height="50">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="50%" style="stop-color:#dbb84d"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Globe with translation arrows -->
  <g transform="translate(5, 5)">
    <!-- Globe circle -->
    <circle cx="20" cy="20" r="18" fill="none" stroke="#1e3a5f" stroke-width="2"/>
    <!-- Latitude lines -->
    <ellipse cx="20" cy="20" rx="18" ry="7" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <ellipse cx="20" cy="20" rx="10" ry="18" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <!-- Translation arrows -->
    <path d="M15 8 L8 15 L12 15 L12 25 L8 25 L15 32" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M25 8 L32 15 L28 15 L28 25 L32 25 L25 32" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text: Translatio Global -->
  <text x="55" y="22" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#1e3a5f">
    Translatio
  </text>
  <text x="144" y="22" font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="url(#goldGradient)">
    Global
  </text>
  
  <!-- Tagline -->
  <text x="55" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280" letter-spacing="1">
    SERVICIOS PROFESIONALES DE TRADUCCIÓN
  </text>
</svg>
