server {
    listen 80;
    server_name translatio.thefuckinggoat.cloud;

    root /srv/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for language routes
    location /es/ { try_files $uri $uri/ /index.html; }
    location /en/ { try_files $uri $uri/ /en/index.html; }
    location /pt/ { try_files $uri $uri/ /pt/index.html; }
    location /zh/ { try_files $uri $uri/ /zh/index.html; }
    location /fr/ { try_files $uri $uri/ /fr/index.html; }

    location / {
        try_files $uri $uri/ =404;
    }
}
